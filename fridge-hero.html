<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridge Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f4ef;
      --surface: #ffffff;
      --text: #1c1917;
      --muted: #57534e;
      --accent: #c2410c;
      --accent-hover: #9a3412;
      --border: #e7e5e4;
      --shadow: 0 1px 3px rgba(28, 25, 23, 0.06), 0 12px 40px rgba(28, 25, 23, 0.08);
      --radius: 14px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(194, 65, 12, 0.08), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(120, 113, 108, 0.06), transparent);
    }

    main {
      max-width: 420px;
      margin: 0 auto;
      padding: clamp(2rem, 6vw, 3.5rem) 1.25rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.75rem, 5vw, 2.125rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
      color: var(--text);
    }

    .tagline {
      margin: 0;
      font-size: 0.9375rem;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.75rem 1.5rem 1.5rem;
    }

    fieldset {
      border: none;
      margin: 0;
      padding: 0;
    }

    legend {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field:last-of-type {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      color: var(--text);
    }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]::placeholder {
      color: #a8a29e;
    }

    input[type="text"]:hover {
      border-color: #d6d3d1;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.15);
    }

    .actions {
      margin-top: 0.25rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, var(--accent) 0%, #9a3412 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 2px 0 #7c2d12, 0 4px 12px rgba(194, 65, 12, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button[type="submit"]:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow: 0 3px 0 #7c2d12, 0 8px 20px rgba(194, 65, 12, 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #7c2d12, 0 2px 8px rgba(194, 65, 12, 0.3);
    }

    button[type="submit"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .recipe-result {
      margin-top: 1.75rem;
    }

    .recipe-result:has(#recipe-output:empty) {
      display: none;
    }

    .recipe-result__card {
      background: #faf8f5;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.35rem 1.5rem 1.5rem;
      box-shadow:
        0 1px 2px rgba(28, 25, 23, 0.04),
        0 8px 24px rgba(28, 25, 23, 0.07),
        0 24px 48px rgba(28, 25, 23, 0.05);
    }

    .recipe-result__title {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.35;
      margin: 0 0 1rem;
      padding-bottom: 0.85rem;
      color: var(--muted);
      border-bottom: 1px solid rgba(231, 229, 228, 0.9);
    }

    .recipe-result__text {
      margin: 0;
      font-size: 1rem;
      line-height: 1.85;
      letter-spacing: 0.01em;
      color: var(--text);
      word-break: break-word;
    }

    .recipe-result__para {
      margin: 0 0 0.9em;
    }

    .recipe-result__para:last-child {
      margin-bottom: 0;
    }

    @keyframes recipeFadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .recipe-result__text--enter {
      animation: recipeFadeIn 0.5s ease-out forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .recipe-result__text--enter {
        animation: none;
      }
    }

    .recipe-result__text.is-error {
      color: #991b1b;
    }

    .recipe-result__card:has(.recipe-result__text.is-error) {
      background: #fff5f5;
      border-color: #fecaca;
      box-shadow:
        0 1px 2px rgba(185, 28, 28, 0.06),
        0 8px 24px rgba(185, 28, 28, 0.08);
    }

    button[type="submit"]:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Fridge Hero</h1>
      <p class="tagline">What’s in your fridge? We’ll help you cook.</p>
    </header>

    <form class="card" id="fridge-form" action="#" method="get" novalidate>
      <fieldset>
        <legend>Your ingredients</legend>

        <div class="field">
          <label for="ingredient-1">Ingredient 1</label>
          <input
            id="ingredient-1"
            name="ingredient1"
            type="text"
            autocomplete="off"
            placeholder="e.g. eggs"
          />
        </div>

        <div class="field">
          <label for="ingredient-2">Ingredient 2</label>
          <input
            id="ingredient-2"
            name="ingredient2"
            type="text"
            autocomplete="off"
            placeholder="e.g. spinach"
          />
        </div>

        <div class="field">
          <label for="ingredient-3">Ingredient 3</label>
          <input
            id="ingredient-3"
            name="ingredient3"
            type="text"
            autocomplete="off"
            placeholder="e.g. feta"
          />
        </div>
      </fieldset>

      <div class="actions">
        <button type="submit" id="cook-btn">Cook Magic</button>
      </div>
    </form>

    <section class="recipe-result" aria-live="polite">
      <div class="recipe-result__card">
        <h2 class="recipe-result__title">Recipe</h2>
        <div id="recipe-output" class="recipe-result__text" role="status"></div>
      </div>
    </section>

    <footer>Enter three ingredients and tap Cook Magic.</footer>
  </main>

  <script>
    const GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions";
    // Client-side keys are visible to visitors; use a server proxy in production.
    const GROQ_API_KEY =
      "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";

    async function requestGroqChatCompletion(prompt) {
      const response = await fetch(GROQ_API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${GROQ_API_KEY}`,
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            {
              role: "user",
              content: prompt,
            },
          ],
        }),
      });

      const raw = await response.text();
      if (!response.ok) {
        throw new Error(raw || `${response.status} ${response.statusText}`);
      }

      const data = JSON.parse(raw);
      const text = data.choices[0].message.content;
      return typeof text === "string" ? text : "";
    }

    function renderRecipeText(el, text) {
      el.textContent = "";
      const normalized = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = normalized.split("\n");
      const blocks = [];
      let current = [];
      for (const line of lines) {
        if (line === "") {
          if (current.length) {
            blocks.push(current);
            current = [];
          }
        } else {
          current.push(line);
        }
      }
      if (current.length) blocks.push(current);

      if (blocks.length === 0) {
        if (normalized.trim() === "") return;
        blocks.push([normalized]);
      }

      for (const blockLines of blocks) {
        const p = document.createElement("p");
        p.className = "recipe-result__para";
        blockLines.forEach((line, i) => {
          if (i > 0) p.appendChild(document.createElement("br"));
          p.appendChild(document.createTextNode(line));
        });
        el.appendChild(p);
      }

      el.classList.remove("recipe-result__text--enter");
      void el.offsetWidth;
      el.classList.add("recipe-result__text--enter");
    }

    const form = document.getElementById("fridge-form");
    const output = document.getElementById("recipe-output");
    const cookBtn = document.getElementById("cook-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const i1 = document.getElementById("ingredient-1").value.trim();
      const i2 = document.getElementById("ingredient-2").value.trim();
      const i3 = document.getElementById("ingredient-3").value.trim();

      const userPrompt = [
        "You are Fridge Hero, a helpful cooking assistant.",
        "",
        "Propose one practical recipe using these ingredients (add common pantry items only if needed: salt, oil, basic spices):",
        `- ${i1 || "(none)"}`,
        `- ${i2 || "(none)"}`,
        `- ${i3 || "(none)"}`,
        "",
        "Write plain text with exactly three sections in this order. Put each heading on its own line exactly as written:",
        "",
        "Title",
        "Immediately below: a single line containing only the recipe name (no quotes or extra labels).",
        "",
        "Ingredients",
        "Below that: a bullet list. Each line must include an amount (metric or US customary is fine).",
        "",
        "Instructions",
        "Below that: numbered steps using 1. 2. 3. … Put one main action in each step; add times and heat level when relevant.",
        "",
        "No preamble before Title and no notes after the final step.",
      ].join("\n");

      output.classList.remove("is-error", "recipe-result__text--enter");
      output.textContent = "Cooking up ideas…";
      cookBtn.disabled = true;

      try {
        const reply = await requestGroqChatCompletion(userPrompt);
        renderRecipeText(output, reply);
      } catch (err) {
        output.classList.add("is-error");
        output.textContent =
          err instanceof Error ? err.message : "Something went wrong.";
      } finally {
        cookBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
